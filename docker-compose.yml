services:
  backend:
    build: .
    container_name: api-miguel-backend
    restart: always
    ports:
      - "3002:3000"
    environment:
      PORT: "3000"
      JWT_SECRET: "019283"
      ADMIN_USER: "barbeariadomineiro"
      ADMIN_PASS: "depaiparafilho2026"
    volumes:
      - dados_miguel:/app/database
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apimiguel.rule=Host(`api-miguel.unvgroup.tech`)"
      - "traefik.http.routers.apimiguel.entrypoints=websecure"
      - "traefik.http.routers.apimiguel.tls.certresolver=myresolver"
      - "traefik.http.services.apimiguel.loadbalancer.server.port=3000"

volumes:
  dados_miguel:
